name: Deploy AWS Cloud News

on:
  push:
    branches: [main]
  schedule:
    # Refresh news every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit updated news.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch latest AWS news
        run: npm run update-news

      # Commit the refreshed news.json so the repo stays in sync.
      # [skip ci] prevents this commit from triggering another run.
      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: refresh news.json [skip ci]"
          git push
        continue-on-error: true   # non-fatal if nothing changed or push fails

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy everything except node_modules and hidden dirs
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
